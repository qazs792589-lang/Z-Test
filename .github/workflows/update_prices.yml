name: Update Stock Prices
on:
  schedule:
    # 台灣時間為 14:05，UTC 為 06:05 (週一、週三、週五台股收盤)
    - cron: '5 6 * * 1,3,5'
    # 台灣時間為 06:00，UTC 為 22:00 (週二、週四、週六美股收盤，即 UTC 週一、週三、週五 22:00)
    - cron: '0 22 * * 1,3,5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run update script
        run: node scripts/update_prices_github.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/stock_prices.json stock_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock prices" && git push)

