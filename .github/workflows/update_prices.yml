name: Update Stock Prices

on:
  schedule:
    # 台灣時間 14:10，UTC 06:10 (週一到週五，台股收盤後)
    - cron: '10 6 * * 1-5'
    # 台灣時間 06:10 (次日)，UTC 22:10 (週一到週四，對應美股當日收盤)
    - cron: '10 22 * * 1-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: node scripts/update_prices_github.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/stock_prices.json stock_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock prices" && git push)
