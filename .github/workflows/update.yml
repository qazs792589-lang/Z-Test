name: 每日自動更新台股收盤價

on:
  schedule:
    # 台灣時間週一至週五的下午 3:00 (15:00) 進行更新
    # 15:00 台北時間等於 UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 允許手動點擊按鈕觸發更新

permissions:
  contents: write

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 執行抓取價格腳本
        run: node fetch.js

      - name: 自動提交並推送更新後的資料
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_prices.json
          # 如果沒有變更則不進行 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 每日自動更新收盤價 [skip ci]" && git push)
